<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    <title>Image transform design</title>

    <link href="./styles/general.css" rel="stylesheet"/>
    <link href="./styles/header.css" rel="stylesheet"/>
    <link href="./styles/info.css" rel="stylesheet"/>
    <link href="./styles/imageBox.css" rel="stylesheet"/>
    <link href="./styles/socialLinks.css" rel="stylesheet"/>

    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous" referrerpolicy="no-referrer"/>
  </head>
  <body>
    <div class="container">
      <!-- Structure of the header, it contains
       website logo
       website upper links-->
      <header>
        <img src="./images/logo.png" alt="logo icon"/>
        
        <ul>
          <li><a href="./">HOME</a></li>
          <li><a href="">ABOUT</a></li>
          <li><a href="">PORTFOLIO</a></li>
          <li><a href="">SERVICES</a></li>
          <li><a href="">HIRE ME</a></li>
        </ul>
      </header>
      <!-- middle-left part of the website, contains:
        title
        CV download link
        partner companies logos-->
      <div class="info">
        <h1>I'm <span>Kate</span> Amelia</h1>
        <p>
          This is the official portfolio websites to showcase
          all my works related to web development and UI design.
        </p>
        <a href="">Download CV</a>
      </div>
      <!-- middle-right part of the website, contains:
       image box-->
      <div class="imageBox">
        <img src="./images/pattern.png" alt="background image"
          class="backgroundImage"/>
        <img src="./images/girl.png" alt="girl image"
          class="mainImage"/>
      </div>
      <!-- bottom side of the middle-left part of the website-->
       <div class="socialLinks">
        <a href=""><i class="fab fa-linkedin-in"></i></a>
        <a href=""><i class="fab fa-behance"></i></a>
        <a href=""><i class="fab fa-dribbble"></i></a>
       </div>
    </div>
  </body>
</html>
